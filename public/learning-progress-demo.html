<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Progress Tracking - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .course-selector {
            margin-bottom: 20px;
        }

        .course-selector label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .course-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .course-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .progress-section {
            margin-top: 30px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-header h3 {
            color: #333;
            font-size: 1.2em;
        }

        .progress-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            flex: 1;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9em;
            font-weight: bold;
        }

        .lessons-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        .lesson-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .lesson-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .lesson-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .lesson-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .lesson-type {
            color: #999;
            font-size: 0.85em;
        }

        .lesson-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-incomplete {
            background: #fff3cd;
            color: #856404;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-complete {
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            font-size: 0.85em;
            margin-left: 10px;
        }

        .btn-complete:hover {
            background: #45a049;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .enrollments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .enrollment-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enrollment-card:hover {
            border-color: #667eea;
            background: #f0f0f0;
        }

        .enrollment-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .enrollment-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .enrollment-progress {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .enrollment-progress-bar {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .enrollments-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Learning Progress Tracking</h1>
            <p>Theo dõi tiến độ học tập của bạn</p>
        </header>

        <div class="main-content">
            <!-- Phần 1: Lấy Tiến Độ Khóa Học -->
            <div class="card">
                <h2>📊 Tiến Độ Khóa Học</h2>

                <div class="message" id="messageProgress"></div>

                <div class="course-selector">
                    <label for="courseSelect">Chọn khóa học:</label>
                    <select id="courseSelect">
                        <option value="">-- Chọn khóa học --</option>
                        <option value="1">Laravel từ Zero đến Hero</option>
                        <option value="2">React.js Masterclass</option>
                        <option value="3">UI/UX Design Fundamentals</option>
                        <option value="4">Python cho Data Science</option>
                        <option value="5">Vue.js - Progressive Framework</option>
                        <option value="6">Node.js & Express - Backend Mastery</option>
                        <option value="7">Flutter - Build Cross-Platform Apps</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="getCourseProgress()">
                    Xem Tiến Độ
                </button>

                <div class="progress-section" id="progressSection" style="display: none;">
                    <div class="progress-stats">
                        <div class="stat">
                            <div class="stat-value" id="totalLessons">0</div>
                            <div class="stat-label">Tổng Bài Học</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="completedLessons">0</div>
                            <div class="stat-label">Đã Hoàn Thành</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="progressPercent">0%</div>
                            <div class="stat-label">Tiến Độ</div>
                        </div>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%">
                            <span id="progressText">0%</span>
                        </div>
                    </div>

                    <h3 style="margin-top: 20px; margin-bottom: 15px;">Danh Sách Bài Học:</h3>
                    <div class="lessons-list" id="lessonsList"></div>
                </div>
            </div>

            <!-- Phần 2: Khóa Học Của Tôi -->
            <div class="card">
                <h2>📖 Khóa Học Của Tôi</h2>

                <div class="message" id="messageEnrollments"></div>

                <button class="btn btn-primary" onclick="getMyEnrollments()">
                    Tải Danh Sách Khóa Học
                </button>

                <div id="enrollmentsContainer" style="display: none;">
                    <div class="enrollments-grid" id="enrollmentsList"></div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Đang tải...</p>
                </div>
            </div>

            <!-- Phần 3: Hoàn Thành Bài Học -->
            <div class="card full-width">
                <h2>✅ Đánh Dấu Hoàn Thành Bài Học</h2>

                <div class="message" id="messageComplete"></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 600;">
                            Chọn Bài Học:
                        </label>
                        <input type="number" id="lessonIdInput" placeholder="Nhập ID của bài học" 
                            style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 600;">
                            Số Giây Xem (optional):
                        </label>
                        <input type="number" id="watchedSecondsInput" placeholder="Số giây" value="0"
                            style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                    </div>
                </div>

                <button class="btn btn-primary" onclick="completeLessson()">
                    Hoàn Thành Bài Học
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        const TOKEN = localStorage.getItem('auth_token'); // Lấy token từ localStorage sau khi login

        /**
         * Fetch wrapper với error handling
         */
        async function fetchAPI(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                };

                if (body) {
                    options.body = JSON.stringify(body);
                }

                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Có lỗi xảy ra');
                }

                return data;
            } catch (error) {
                console.error('API Error:', error);
                showMessage('error', error.message, 'messageProgress');
                throw error;
            }
        }

        /**
         * Hiển thị thông báo
         */
        function showMessage(type, message, containerId = 'messageProgress') {
            const messageEl = document.getElementById(containerId);
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 5000);
        }

        /**
         * Lấy tiến độ khóa học
         */
        async function getCourseProgress() {
            const courseId = document.getElementById('courseSelect').value;

            if (!courseId) {
                showMessage('error', 'Vui lòng chọn khóa học', 'messageProgress');
                return;
            }

            try {
                showLoading(true);
                const data = await fetchAPI(`/course/${courseId}/progress`);

                if (data.success) {
                    updateProgressDisplay(data.data);
                    document.getElementById('progressSection').style.display = 'block';
                    showMessage('success', 'Tải tiến độ thành công', 'messageProgress');
                } else {
                    showMessage('error', data.message, 'messageProgress');
                }
            } catch (error) {
                // Error đã được xử lý trong fetchAPI
            } finally {
                showLoading(false);
            }
        }

        /**
         * Cập nhật hiển thị tiến độ
         */
        function updateProgressDisplay(data) {
            const progressPercent = data.progress_percent || 0;

            document.getElementById('totalLessons').textContent = data.total_lessons;
            document.getElementById('completedLessons').textContent = data.completed_lessons;
            document.getElementById('progressPercent').textContent = progressPercent + '%';

            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = progressPercent + '%';
            document.getElementById('progressText').textContent = progressPercent + '%';

            // Hiển thị danh sách bài học
            const lessonsList = document.getElementById('lessonsList');
            lessonsList.innerHTML = data.lessons.map(lesson => `
                <div class="lesson-item">
                    <input type="checkbox" class="lesson-checkbox" 
                        ${lesson.is_completed ? 'checked disabled' : ''}>
                    <div class="lesson-info">
                        <div class="lesson-title">${lesson.title}</div>
                        <div class="lesson-type">Loại: ${lesson.type}</div>
                    </div>
                    <span class="lesson-status ${lesson.is_completed ? 'status-completed' : 'status-incomplete'}">
                        ${lesson.is_completed ? '✓ Đã hoàn thành' : 'Chưa hoàn thành'}
                    </span>
                    ${!lesson.is_completed ? 
                        `<button class="btn btn-complete" onclick="completeLessonDirect(${lesson.id})">
                            Hoàn Thành
                        </button>` 
                        : ''}
                </div>
            `).join('');
        }

        /**
         * Lấy danh sách khóa học của tôi
         */
        async function getMyEnrollments() {
            try {
                showLoading(true);
                const data = await fetchAPI('/my-enrollments');

                if (data.success) {
                    displayEnrollments(data.data);
                    document.getElementById('enrollmentsContainer').style.display = 'block';
                    showMessage('success', 'Tải danh sách thành công', 'messageEnrollments');
                } else {
                    showMessage('error', data.message, 'messageEnrollments');
                }
            } catch (error) {
                // Error đã được xử lý
            } finally {
                showLoading(false);
            }
        }

        /**
         * Hiển thị danh sách enrollments
         */
        function displayEnrollments(enrollments) {
            const enrollmentsList = document.getElementById('enrollmentsList');
            enrollmentsList.innerHTML = enrollments.map(enrollment => `
                <div class="enrollment-card" onclick="selectCourseFromCard(${enrollment.course_id})">
                    <h4>${enrollment.course_title}</h4>
                    <p><strong>Giảng viên:</strong> ${enrollment.instructor_name}</p>
                    <p><strong>Tiến độ:</strong> ${enrollment.completed_lessons}/${enrollment.total_lessons}</p>
                    
                    <div class="enrollment-progress">
                        <div class="enrollment-progress-bar" style="width: ${enrollment.progress_percent}%"></div>
                    </div>
                    
                    <p style="text-align: center; font-weight: bold; color: #667eea;">
                        ${enrollment.progress_percent}%
                    </p>
                    
                    <p style="font-size: 0.85em;">
                        ${enrollment.status === 'completed' ? '✓ Đã hoàn thành' : 'Đang học'}
                    </p>
                </div>
            `).join('');
        }

        /**
         * Chọn khóa học từ card
         */
        function selectCourseFromCard(courseId) {
            document.getElementById('courseSelect').value = courseId;
            getCourseProgress();
            // Scroll to progress section
            document.querySelector('.main-content').scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * Hoàn thành bài học trực tiếp
         */
        async function completeLessonDirect(lessonId) {
            try {
                const data = await fetchAPI(`/lesson/${lessonId}/complete`, 'POST', {
                    watched_seconds: 0
                });

                if (data.success) {
                    showMessage('success', data.message, 'messageProgress');
                    // Tải lại tiến độ
                    setTimeout(() => getCourseProgress(), 500);
                } else {
                    showMessage('error', data.message, 'messageProgress');
                }
            } catch (error) {
                // Error đã được xử lý
            }
        }

        /**
         * Hoàn thành bài học từ form
         */
        async function completeLessson() {
            const lessonId = document.getElementById('lessonIdInput').value;
            const watchedSeconds = document.getElementById('watchedSecondsInput').value || 0;

            if (!lessonId) {
                showMessage('error', 'Vui lòng nhập ID bài học', 'messageComplete');
                return;
            }

            try {
                const data = await fetchAPI(`/lesson/${lessonId}/complete`, 'POST', {
                    watched_seconds: parseInt(watchedSeconds)
                });

                if (data.success) {
                    showMessage('success', data.message, 'messageComplete');
                    document.getElementById('lessonIdInput').value = '';
                    document.getElementById('watchedSecondsInput').value = '0';
                    // Tải lại tiến độ nếu đã chọn khóa học
                    setTimeout(() => getCourseProgress(), 500);
                } else {
                    showMessage('error', data.message, 'messageComplete');
                }
            } catch (error) {
                // Error đã được xử lý
            }
        }

        /**
         * Hiển thị/ẩn loading
         */
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        // Khởi tạo khi trang load
        document.addEventListener('DOMContentLoaded', () => {
            if (!TOKEN) {
                alert('Vui lòng đăng nhập trước. Token không tìm thấy.');
            }
        });
    </script>
</body>
</html>
