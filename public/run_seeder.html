<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Seeder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .button:hover {
            background: #764ba2;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 400px;
            overflow-y: auto;
        }

        .loading {
            display: none;
            color: #667eea;
        }
    </style>
</head>

<body>
    <h1>🌱 Run Expanded Sample Data Seeder</h1>

    <button class="button" onclick="runSeeder()">▶ Run Seeder Now</button>

    <div class="loading" id="loading">
        <p>⏳ Đang chạy...</p>
    </div>

    <div class="output" id="output" style="display:none;"></div>

    <script>
        async function runSeeder() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('output').style.display = 'none';

            try {
                const response = await fetch('/api/run-seeder', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': '{{ csrf_token() }}'
                    },
                    body: JSON.stringify({
                        seeder: 'ExpandedSampleDataSeeder'
                    })
                });

                const data = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('output').style.display = 'block';
                document.getElementById('output').textContent = data.output || 'Hoàn thành!';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('output').style.display = 'block';
                document.getElementById('output').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
